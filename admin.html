<style>
  :root{--bg:#f5f6f8;--surface:#fff;--ink:#1a2230;--muted:#6b7585;--line:#e6e9ef;
    --brand:#2f5fe0;--brand-dark:#214bc0;--absent:#e0492f;--absent-soft:#fdecea;--present:#1f9d6b;--warn:#d98613;
    --radius:14px;--shadow:0 1px 2px rgba(20,30,50,.06),0 8px 24px rgba(20,30,50,.06)}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:780px;margin:0 auto;padding:0 16px 80px}
  .hidden{display:none}
  .auth-screen{min-height:100vh;display:grid;place-items:center;padding:20px}
  .auth-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow)}
  .auth-card .logo{width:48px;height:48px;border-radius:12px;background:var(--ink);display:grid;place-items:center;color:#fff;font-weight:800;margin-bottom:16px}
  .auth-card h2{margin:0 0 4px;font-size:20px}.auth-card p{margin:0 0 20px;font-size:13px;color:var(--muted)}
  .auth-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  .auth-card input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:15px}
  .auth-card input:focus{outline:2px solid var(--brand);outline-offset:-1px}
  header.app{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--line)}
  .head-inner{max-width:780px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
  .logo{width:36px;height:36px;border-radius:10px;background:var(--ink);display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;flex:none}
  .head-inner h1{font-size:15px;margin:0;font-weight:700}.head-inner p{margin:0;font-size:12px;color:var(--muted)}
  .head-inner .sp{flex:1}
  .logout{border:1px solid var(--line);background:var(--surface);color:var(--ink);font:inherit;font-weight:600;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer}
  .tabs{display:flex;gap:4px;max-width:780px;margin:0 auto;padding:0 12px}
  .tab{flex:1;padding:11px;border:0;background:none;font:inherit;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin:16px 0 12px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 10px;font-size:14px}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .addrow input,.addrow select{flex:1;min-width:110px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:15px}
  .btn{border:0;border-radius:11px;padding:11px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .btn-primary{background:var(--brand);color:#fff}.btn-primary:active{background:var(--brand-dark)}
  .btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  .item{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
  .item:first-of-type{border-top:0}.item .grow{flex:1;min-width:0}
  .item .nm{font-weight:600}.item .sub{font-size:12px;color:var(--muted)}
  .item input{padding:8px;border:1px solid var(--line);border-radius:8px;font:inherit}
  .item select{padding:8px;border:1px solid var(--line);border-radius:8px;font:inherit;max-width:160px}
  .icon-btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);font:inherit;font-weight:600;font-size:12px;padding:6px 11px;border-radius:8px;cursor:pointer}
  .icon-btn.danger{color:var(--absent)}
  .acct-tip{background:#eef3ff;border:1px solid #d4e0ff;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:8px;line-height:1.6}
  .acct-tip code{background:#fff;padding:1px 5px;border-radius:4px}
  .dcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
  .dcard .gauge{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:14px;flex:none;color:#fff}
  .dcard .cn{font-weight:700}.dcard .det{font-size:12px;color:var(--muted)}
  .legend{font-size:12px;color:var(--muted);margin:16px 2px 10px}
  .empty{text-align:center;color:var(--muted);padding:36px 16px;font-size:14px}.empty strong{display:block;color:var(--ink);font-size:16px;margin-bottom:4px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .lap-bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin:16px 0 10px}
  .lap-bar .field{min-width:130px}
  .lap-bar label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .lap-bar input,.lap-bar select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:14px}
  .seg{display:flex;gap:4px;background:#eef0f4;border-radius:11px;padding:4px;margin-bottom:12px;flex-wrap:wrap}
  .seg button{flex:1;min-width:84px;padding:8px;border:0;background:none;border-radius:8px;font:inherit;font-weight:600;font-size:13px;color:var(--muted);cursor:pointer}
  .seg button.active{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .mcard{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
  .mcard .n{font-size:26px;font-weight:800}.mcard .l{font-size:12px;color:var(--muted);font-weight:600}
  .rpt-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .rpt-table th{text-align:left;padding:9px 11px;background:var(--bg);font-weight:700;font-size:12px;color:var(--muted)}
  .rpt-table td{padding:9px 11px;border-top:1px solid var(--line);vertical-align:top}
  .rpt-table tr.hot td{background:#fff5f3}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--absent-soft);color:var(--absent)}
  .pill.g{background:#e7f6ef;color:var(--present)}.pill.w{background:#fdf2e1;color:var(--warn)}
  @media print{header.app,.tabs,.lap-bar,.seg,.btn{display:none!important}body{background:#fff}.wrap{padding:0}}
  .drill{background:var(--surface);border:1px solid var(--line);border-top:0;border-radius:0 0 var(--radius) var(--radius);margin:-8px 0 10px;padding:0 14px 12px}
  .drill table{width:100%;border-collapse:collapse;font-size:13px}
  .drill th{text-align:left;padding:7px 8px;color:var(--muted);font-size:11px;font-weight:700}
  .drill td{padding:7px 8px;border-top:1px solid var(--line)}
  .drill tr.rep td{background:#fff5f3}
  .logo{object-fit:cover;overflow:hidden}
  img.logo{background:#fff}
  .chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .chart-card h4{margin:0 0 2px;font-size:15px;color:var(--ink)}
</style>
</head>
<body>

<div id="login-screen" class="auth-screen">
  <div class="auth-card">
    <img class="logo" src="logo.jpg" alt="SMK Batu Maung">
    <h2>Panel Admin</h2>
    <p>Sistem Kehadiran Kelas Tambahan · SMK Batu Maung</p>
    <label for="adm-ic">No. Kad Pengenalan</label>
    <input type="text" id="adm-ic" inputmode="numeric" placeholder="cth: 900101071234" autocomplete="username">
    <button class="btn btn-primary" id="adm-login" style="width:100%;margin-top:18px;padding:13px">Log Masuk</button>
    <div style="font-size:12px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.5">Hanya guru yang dibenarkan akses admin boleh log masuk di sini.</div>
  </div>
</div>

<div id="app" class="hidden">
<header class="app">
  <div class="head-inner">
    <img class="logo" src="logo.jpg" alt="SMK Batu Maung">
    <div><h1>Panel Admin</h1><p>Kehadiran Kelas Tambahan</p></div>
    <div class="sp"></div>
    <a href="index.html" class="logout" style="text-decoration:none;margin-right:6px">App Guru</a>
    <button class="logout" id="btn-logout">Log Keluar</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="guru">Guru</button>
    <button class="tab" data-tab="pelajar">Pelajar</button>
    <button class="tab" data-tab="data">Laporan &amp; Analisis</button>
    <button class="tab" data-tab="hukuman">Hukuman</button>
  </div>
</header>
<div class="wrap">
  <div id="tab-guru"></div>
  <div id="tab-pelajar" class="hidden"></div>
  <div id="tab-data" class="hidden"></div>
  <div id="tab-hukuman" class="hidden"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ===== KONFIGURASI ===== */
const SUPABASE_URL  = "https://uxodkjkpwiyfxozgrnib.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4b2Rramtwd2l5ZnhvemdybmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDY0MTUsImV4cCI6MjA5NzE4MjQxNX0.ndWT0nLnNQTo7rp8naPzYfRUXc2eRZ1U06GQScSCqBY";
const ADMIN_EMAIL   = "admin@kehadiran.local";   // akaun admin (cipta di Dashboard + daftar dalam jadual admins)
const FN_URL        = `${SUPABASE_URL}/functions/v1/admin-teachers`;
/* ======================= */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const $=s=>document.querySelector(s);
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);}

const cache={students:[]};

/* ===== panggil Edge Function (hantar token sesi admin) ===== */
async function callFn(body){
  const {data:{session}}=await sb.auth.getSession();
  if(!session) throw new Error('Sesi tamat, log masuk semula');
  const res=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},body:JSON.stringify(body)});
  const out=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(out.error||('Ralat '+res.status));
  return out;
}

/* ===== AUTH (IC + semak is_admin) ===== */
let adminName='Admin';
async function isCallerAdmin(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user) return false;
  const ic=(user.email||'').split('@')[0];
  const {data:t}=await sb.from('teachers').select('is_admin,name').eq('ic',ic).maybeSingle();
  if(t&&t.is_admin){ adminName=t.name||'Admin'; return true; }
  return false;
}
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(session && await isCallerAdmin()) enterApp();
}
$('#adm-login').onclick=async()=>{
  const ic=$('#adm-ic').value.replace(/\D/g,'');
  if(ic.length<4){toast('Masukkan No. KP penuh');return;}
  $('#adm-login').disabled=true;
  const {error}=await sb.auth.signInWithPassword({email:ic+'@kehadiran.local',password:ic.slice(-4)});
  if(error){$('#adm-login').disabled=false;toast('No. KP tidak sah atau akaun belum dicipta');return;}
  if(!(await isCallerAdmin())){
    await sb.auth.signOut(); $('#adm-login').disabled=false;
    alert('⚠️ Akaun ini tiada akses Admin.\nHubungi pentadbir untuk dibenarkan.');
    return;
  }
  $('#adm-login').disabled=false; enterApp();
};
$('#adm-ic').addEventListener('keydown',e=>{if(e.key==='Enter')$('#adm-login').click();});
$('#btn-logout').onclick=async()=>{await sb.auth.signOut();location.reload();};
function enterApp(){ const ls=$('#login-screen'); ls.style.display='none'; ls.classList.add('hidden'); $('#app').classList.remove('hidden'); window.scrollTo(0,0); renderGuru(); }

const classesFromStudents=()=>[...new Set(cache.students.map(s=>s.kelas).filter(Boolean))].sort();
async function loadStudents(){ const {data,error}=await sb.from('students').select('*').order('name'); if(error)throw error; cache.students=data; }

/* ===== GURU ===== */
async function renderGuru(){
  let list=[]; try{ const {data,error}=await sb.from('teachers').select('*').order('name'); if(error)throw error; list=data; await loadStudents(); }catch(e){ toast('Ralat: '+e.message); }
  const cls=classesFromStudents();
  const clsOpts=v=>'<option value="">(Tiada kelas)</option>'+cls.map(c=>`<option value="${esc(c)}" ${c===v?'selected':''}>${esc(c)}</option>`).join('');
  $('#tab-guru').innerHTML=`<div class="card"><h3>Guru <span style="font-size:13px;color:var(--muted);font-weight:600">(${list.length} orang)</span></h3>
    <div class="addrow"><input type="text" id="g-name" placeholder="Nama"><input type="text" id="g-ic" placeholder="No. KP (12 digit)" inputmode="numeric"><select id="g-class">${clsOpts()}</select><button class="btn btn-primary" id="g-add">Tambah + Cipta Akaun</button></div>
    <div class="addrow"><button class="btn btn-ghost" id="g-import">Import Guru (CSV)</button><button class="btn btn-ghost" id="g-templat">Templat CSV</button><input type="file" id="g-file" accept=".csv" hidden></div>
    <div class="addrow"><input type="text" id="g-search" placeholder="🔍 Cari nama atau No. KP guru"></div>
    <div id="g-tip" class="acct-tip hidden"></div>
    <div id="g-count" class="sub" style="margin:4px 2px"></div>
    <div id="g-list" style="margin-top:6px">${list.map(t=>`<div class="item" data-ic="${esc(t.ic)}" data-id="${t.id}" data-name="${esc((t.name||'').toLowerCase())}">
      <span class="grow"><span class="nm">${esc(t.name)} ${t.is_admin?'<span class="pill g" style="font-size:10px">ADMIN</span>':''}</span><br><span class="sub">${esc(t.ic)} · ${esc(t.class_name||'tiada kelas')}</span></span>
      <select data-act="setclass">${clsOpts(t.class_name)}</select>
      <button class="icon-btn" data-act="admin" style="${t.is_admin?'background:var(--ink);color:#fff;border-color:var(--ink)':''}">Admin</button>
      <button class="icon-btn" data-act="reset">Reset PW</button>
      <button class="icon-btn danger" data-act="del">Padam</button></div>`).join('')||'<div class="sub">Tiada guru.</div>'}</div></div>`;

  $('#g-add').onclick=async()=>{
    const name=$('#g-name').value.trim(), ic=$('#g-ic').value.replace(/\D/g,''), cn=$('#g-class').value;
    if(!name||!ic){toast('Nama & IC wajib');return;}
    $('#g-add').disabled=true;
    try{ const r=await callFn({action:'create',ic,name,class_name:cn});
      $('#g-tip').classList.remove('hidden');
      $('#g-tip').innerHTML=`✅ Akaun dicipta. Beritahu guru:<br>No. KP: <code>${esc(ic)}</code><br>Kata laluan sementara: <code>${esc(r.default_password)}</code> (4 digit akhir IC)<br>Login terus guna No. KP + 4 digit akhir IC.`;
      renderGuru(); toast('Guru + akaun dicipta ✓');
    }catch(e){ toast('Ralat: '+e.message); }
    $('#g-add').disabled=false;
  };
  $('#g-templat').onclick=()=>download('templat_guru.csv','Nama,NoKP,Kelas\nCikgu Contoh,900101071234,5 AVICENNA');
  $('#g-import').onclick=()=>$('#g-file').click();
  $('#g-file').onchange=ev=>{const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>importGuruCSV(rd.result);rd.readAsText(f,'UTF-8');ev.target.value='';};
  $('#g-search').oninput=e=>{
    const q=e.target.value.trim().toLowerCase();
    const items=[...document.querySelectorAll('#g-list .item')];
    let shown=0;
    items.forEach(it=>{const hit=!q||it.dataset.name.includes(q)||(it.dataset.ic||'').includes(q);it.style.display=hit?'':'none';if(hit)shown++;});
    $('#g-count').textContent=q?`${shown} padanan ditemui`:'';
  };
  $('#g-list').onclick=async e=>{
    const b=e.target.closest('[data-act]'); if(!b||b.tagName==='SELECT')return;
    const row=e.target.closest('.item'), ic=row.dataset.ic;
    if(b.dataset.act==='del'){ if(confirm('Padam guru ini + akaun loginnya?')){ try{await callFn({action:'delete',ic});renderGuru();toast('Dipadam');}catch(e){toast('Ralat: '+e.message);} } }
    if(b.dataset.act==='reset'){ if(confirm('Reset kata laluan kepada 4 digit akhir IC?')){ try{const r=await callFn({action:'reset',ic});toast('Reset ✓ — PW sementara: '+r.default_password);renderGuru();}catch(e){toast('Ralat: '+e.message);} } }
    if(b.dataset.act==='admin'){ const id=row.dataset.id; const turnOn=!b.style.background; try{const {error}=await sb.from('teachers').update({is_admin:turnOn}).eq('id',id); if(error)throw error; toast(turnOn?'Diberi akses admin ✓':'Akses admin ditarik'); renderGuru();}catch(e){toast('Ralat: '+e.message);} }
  };
  $('#g-list').addEventListener('change',async e=>{
    if(e.target.dataset.act!=='setclass')return;
    const id=e.target.closest('.item').dataset.id;
    try{ const {error}=await sb.from('teachers').update({class_name:e.target.value||null}).eq('id',id); if(error)throw error; toast('Kelas dikemaskini'); }catch(err){toast('Ralat: '+err.message);}
  });
}

async function importGuruCSV(text){
  const rows=parseCSV(text); if(rows.length<2){toast('Fail kosong');return;}
  const h=rows[0].map(x=>x.toLowerCase().replace(/[^a-z]/g,''));
  const find=ks=>h.findIndex(x=>ks.includes(x));
  const iN=find(['nama','name']),iK=find(['nokp','nokad','ic','no']),iC=find(['kelas','class']);
  if(iN<0||iK<0){toast('Lajur perlu: Nama, NoKP');return;}
  const list=[];
  for(let r=1;r<rows.length;r++){const c=rows[r];const name=(c[iN]||'').trim(),ic=(c[iK]||'').replace(/\D/g,''),kelas=(iC>=0?(c[iC]||'').trim():'');if(name&&ic)list.push({name,ic,class_name:kelas});}
  if(!list.length){toast('Tiada baris ada NoKP — tak boleh cipta akaun tanpa NoKP');return;}
  if(!confirm(`Cipta ${list.length} akaun guru? Password default = 4 digit akhir IC.`))return;
  let ok=0,skip=0;
  for(const g of list){
    try{ await callFn({action:'create',ic:g.ic,name:g.name,class_name:g.class_name}); ok++; toast(`Mencipta… ${ok}/${list.length}`); }
    catch(e){ skip++; }
  }
  renderGuru(); toast(`Siap: ${ok} dicipta, ${skip} gagal/dah wujud`);
}

/* ===== PELAJAR ===== */
async function renderPelajar(){
  try{ await loadStudents(); }catch(e){ toast('Ralat: '+e.message); }
  $('#tab-pelajar').innerHTML=`<div class="card"><h3>Pelajar (${cache.students.length})</h3>
    <div class="addrow"><input type="text" id="p-nama" placeholder="Nama"><input type="text" id="p-nokp" placeholder="NoKP"><input type="text" id="p-kelas" placeholder="Kelas"><button class="btn btn-primary" id="p-add">Tambah</button></div>
    <div class="addrow"><button class="btn btn-ghost" id="p-import">Import CSV</button><button class="btn btn-ghost" id="p-templat">Templat</button><input type="file" id="p-file" accept=".csv" hidden></div>
    <div id="p-list" style="margin-top:6px">${cache.students.map(s=>`<div class="item" data-id="${s.id}">
      <span class="grow"><span class="nm">${esc(s.name)}</span><br><span class="sub">${esc(s.nokp)} · ${esc(s.kelas||'-')}</span></span>
      <button class="icon-btn" data-act="edit">Edit</button><button class="icon-btn danger" data-act="del">Padam</button></div>`).join('')||'<div class="sub">Tiada pelajar.</div>'}</div></div>`;

    if(b.dataset.act==='edit'){row.innerHTML=`<input type="text" class="grow" data-f="name" value="${esc(s.name)}"><input type="text" data-f="nokp" value="${esc(s.nokp)}" style="max-width:130px"><input type="text" data-f="kelas" value="${esc(s.kelas||'')}" style="max-width:110px"><button class="icon-btn" data-act="save">Simpan</button><button class="icon-btn" data-act="cancel">Batal</button>`;}
    if(b.dataset.act==='save'){const patch={name:row.querySelector('[data-f=name]').value.trim(),nokp:row.querySelector('[data-f=nokp]').value.trim(),kelas:row.querySelector('[data-f=kelas]').value.trim()};if(!patch.name||!patch.nokp)return;try{const {error}=await sb.from('students').update(patch).eq('id',id);if(error)throw error;renderPelajar();toast('Dikemaskini');}catch(e){toast('Ralat: '+e.message);}}
    if(b.dataset.act==='cancel')renderPelajar();

function download(n,c){const b=new Blob(['\uFEFF'+c],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
function parseCSV(t){t=t.replace(/^\uFEFF/,'');const rows=[];let row=[],cur='',q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c!=='\r')cur+=c;}}if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows.filter(r=>r.some(x=>x.trim()!==''));}
async function importCSV(text){
  try{
    const rows=parseCSV(text);if(rows.length<2)throw new Error('Fail kosong');
    const h=rows[0].map(x=>x.toLowerCase().replace(/[^a-z]/g,''));const find=ks=>h.findIndex(x=>ks.includes(x));
    const iN=find(['nama','name']),iK=find(['nokp','nokad','ic','no']),iC=find(['kelas','class']);
    if(iN<0||iK<0)throw new Error('Lajur perlu: Nama, NoKP');
    const batch=[];for(let r=1;r<rows.length;r++){const c=rows[r];const name=(c[iN]||'').trim(),nokp=(c[iK]||'').trim(),kelas=(iC>=0?(c[iC]||'').trim():'');if(!name||!nokp)continue;batch.push({name,nokp,kelas});}
    if(!batch.length)throw new Error('Tiada baris sah');
    const {error}=await sb.from('students').upsert(batch,{onConflict:'nokp'});if(error)throw error;
    renderPelajar();toast(`${batch.length} pelajar diimport ✓`);
  }catch(e){toast('Ralat import: '+e.message);}
}

async function lpFetch(){

async function lpDelete(){

function computeRPT(){
  const perStudent={},perClass={},perTeacher={},entries=[];
  (RPT.sessions||[]).forEach(s=>{
    perClass[s.class_name]=perClass[s.class_name]||{sessions:0,absent:0};
    perClass[s.class_name].sessions++;
    const tk=s.recorded_by||'?';
    perTeacher[tk]=perTeacher[tk]||{sessions:0,absent:0};
    perTeacher[tk].sessions++;
    (s.absentees||[]).forEach(a=>{
      const st=a.students||{}; const id=st.id||(st.nokp||Math.random());
      entries.push({date:s.date,kelas:s.class_name,subject:s.subject||'-',masa:s.session_time||'',reason:a.reason,name:st.name||'-',nokp:st.nokp||''});
      perStudent[id]=perStudent[id]||{name:st.name||'-',nokp:st.nokp||'',kelas:st.kelas||'',count:0,reasons:{}};
      perStudent[id].count++; perStudent[id].reasons[a.reason]=(perStudent[id].reasons[a.reason]||0)+1;
      perClass[s.class_name].absent++; perTeacher[tk].absent++;
    });
  });
  return {perStudent,perClass,perTeacher,entries};
}
const rosterCount=cn=>cache.students.filter(s=>s.kelas===cn).length;
const tName=ic=>ic==='?'?'(Tidak direkod)':(teachersByIc[ic]?.name||ic);
const monthLabel=()=>{const d=new Date(RPT.from);return d.toLocaleDateString('ms-MY',{month:'long',year:'numeric'});};

function drillClass(cn,cardEl){
  const panel=cardEl.nextElementSibling;
  if(!panel||!panel.hasAttribute('data-drillpanel'))return;
  if(!panel.classList.contains('hidden')){panel.classList.add('hidden');panel.innerHTML='';return;}
  // kumpul kekerapan pelajar dalam kelas ni
  const perStu={};
  (RPT.sessions||[]).filter(s=>s.class_name===cn).forEach(s=>{
    (s.absentees||[]).forEach(a=>{const st=a.students||{};const id=st.nokp||st.name;
      perStu[id]=perStu[id]||{name:st.name||'-',nokp:st.nokp||'',count:0,reasons:{}};
      perStu[id].count++;perStu[id].reasons[a.reason]=(perStu[id].reasons[a.reason]||0)+1;});
  });
  const rows=Object.values(perStu).sort((a,b)=>b.count-a.count);
  panel.classList.remove('hidden');
  panel.innerHTML=rows.length?`<table><tr><th>Pelajar</th><th>Kali</th><th>Sebab</th></tr>
    ${rows.map(p=>`<tr class="${p.count>=2?'rep':''}"><td><b>${esc(p.name)}</b></td><td>${p.count}</td><td style="color:var(--muted)">${Object.entries(p.reasons).map(([r,n])=>esc(r)+'×'+n).join(', ')}</td></tr>`).join('')}
    </table><p class="legend" style="margin:8px 0 0">Baris merah = pelajar yang sama tidak hadir 2 kali atau lebih.</p>`
    :'<p class="legend" style="margin:8px 0 0">Tiada ketidakhadiran untuk kelas ini.</p>';
}

    const rows=C.entries.sort((a,b)=>a.date.localeCompare(b.date)||a.kelas.localeCompare(b.kelas));
    box.innerHTML=`<div class="rpt-card" style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)">
      <h3 style="margin:0 0 4px">Senarai Ketidakhadiran — ${esc(monthLabel())}</h3>
      <p class="legend" style="margin:0 0 10px">${rows.length} rekod</p>
      <table class="rpt-table"><tr><th>Tarikh</th><th>Kelas</th><th>Subjek</th><th>Masa</th><th>Nama</th><th>NoKP</th><th>Sebab</th></tr>
      ${rows.map(e=>`<tr><td>${esc(e.date)}</td><td>${esc(e.kelas)}</td><td>${esc(e.subject)}</td><td>${esc((e.masa||'').replace('-','–'))}</td><td>${esc(e.name)}</td><td>${esc(e.nokp)}</td><td><span class="pill">${esc(e.reason)}</span></td></tr>`).join('')||'<tr><td colspan=7 style="color:var(--present)">Tiada ketidakhadiran.</td></tr>'}
      </table></div>`;
  }
}

/* ===== NAV ===== */
/* ===== HUKUMAN (pelajar ponteng -> profil + tindakan HEM/cikgu) ===== */
const HK_ACTIONS=['Amaran Lisan','Surat Amaran Pertama','Surat Amaran Kedua','Gantung Sekolah','Rujuk Kaunseling','Denda / Khidmat','Lain-lain'];
const fmtMasa=t=>{if(!t)return '';const[a,b]=t.split('-');return b?`${a}\u2013${b}`:a;};
async function renderHukuman(){
  await loadStudents();
  const cls=classesFromStudents();
  $('#tab-hukuman').innerHTML=`<div class="card"><h3>Hukuman / Tindakan Pelajar</h3>
    <p class="legend">Pilih kelas \u2014 hanya pelajar yang <b>pernah tidak hadir</b> akan keluar. Tekan nama untuk rekod/kemaskini hukuman.</p>
    <div class="addrow"><select id="hk-kelas"><option value="">\u2014 Pilih kelas \u2014</option>${cls.map(c=>`<option>${esc(c)}</option>`).join('')}</select>
      <input type="text" id="hk-q" placeholder="\ud83d\udd0d Atau cari nama pelajar"></div>
    <div id="hk-out" style="margin-top:8px"><div class="sub">Pilih kelas untuk mula.</div></div></div>`;
  $('#hk-kelas').onchange=()=>{$('#hk-q').value='';hkListByClass($('#hk-kelas').value);};
  $('#hk-q').oninput=hkSearch;
}
async function hkAbsentStudents(kelas){
  // ambil semua sesi kelas + absentees, kira pelajar berbeza yang pernah tidak hadir
  const {data,error}=await sb.from('attendance_sessions').select('absentees(reason,students(id,name,nokp,kelas))').eq('class_name',kelas);
  if(error)throw error;
  const map={};
  (data||[]).forEach(s=>(s.absentees||[]).forEach(a=>{const st=a.students;if(!st)return;
    map[st.id]=map[st.id]||{...st,count:0};map[st.id].count++;}));
  return Object.values(map).sort((a,b)=>b.count-a.count);
}
async function hkListByClass(kelas){
  const box=$('#hk-out');
  if(!kelas){box.innerHTML='<div class="sub">Pilih kelas untuk mula.</div>';return;}
  box.innerHTML='<div class="empty">Memuat\u2026</div>';
  try{
    const list=await hkAbsentStudents(kelas);
    if(!list.length){box.innerHTML=`<div class="empty" style="color:var(--present)">\u2713 Tiada pelajar tidak hadir dalam ${esc(kelas)}.</div>`;return;}
    box.innerHTML=`<p class="legend">${list.length} pelajar pernah tidak hadir dalam <b>${esc(kelas)}</b>:</p>`+
      list.map(s=>`<div class="item" data-id="${s.id}" data-nokp="${esc(s.nokp||'')}" data-name="${esc(s.name)}" data-kelas="${esc(s.kelas||'')}" style="cursor:pointer">
        <span class="grow"><span class="nm">${esc(s.name)}</span><br><span class="sub">${esc(s.nokp||'')} \u00b7 ${s.count} kali tidak hadir</span></span>
        <span class="pill" style="background:var(--absent-soft);color:var(--absent)">${s.count}\u00d7</span></div>`).join('');
    box.onclick=e=>{const it=e.target.closest('[data-id]');if(it)hkProfil(it.dataset);};
  }catch(e){box.innerHTML='<div class="empty">Ralat: '+esc(e.message)+'</div>';}
}
function hkSearch(){
  const q=$('#hk-q').value.trim().toLowerCase();
  if(!q){const k=$('#hk-kelas').value;hkListByClass(k);return;}
  $('#hk-kelas').value='';
  const m=cache.students.filter(s=>s.name.toLowerCase().includes(q)||(s.nokp||'').includes(q)).slice(0,40);
  const box=$('#hk-out');
  box.innerHTML=m.length?m.map(s=>`<div class="item" data-id="${s.id}" data-nokp="${esc(s.nokp||'')}" data-name="${esc(s.name)}" data-kelas="${esc(s.kelas||'')}" style="cursor:pointer">
    <span class="grow"><span class="nm">${esc(s.name)}</span><br><span class="sub">${esc(s.nokp||'')} \u00b7 ${esc(s.kelas||'')}</span></span></div>`).join(''):'<div class="empty">Tiada padanan.</div>';
  box.onclick=e=>{const it=e.target.closest('[data-id]');if(it)hkProfil(it.dataset);};
}
async function hkProfil(d){
  const box=$('#hk-out');
  box.innerHTML='<div class="empty">Memuat\u2026</div>';
  try{
    const [absR,discR]=await Promise.all([
      sb.from('absentees').select('reason,attendance_sessions(date,class_name,subject,session_time,recorded_by)').eq('student_id',d.id),
      sb.from('discipline').select('*').eq('student_nokp',d.nokp).order('created_at',{ascending:false})
    ]);
    if(absR.error)throw absR.error; if(discR.error)throw discR.error;
    const abs=absR.data||[], disc=discR.data||[];
    const aRows=abs.map(a=>({date:a.attendance_sessions?.date||'-',subject:a.attendance_sessions?.subject||'-',masa:a.attendance_sessions?.session_time||'',cikgu:tName(a.attendance_sessions?.recorded_by||'?'),reason:a.reason})).sort((x,y)=>y.date.localeCompare(x.date));
    box.innerHTML=`<button class="btn btn-ghost" id="hk-back" style="margin-bottom:10px">\u2190 Kembali</button>
      <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)">
        <div style="font-size:17px;font-weight:800">${esc(d.name)}</div>
        <div style="font-size:13px;color:var(--muted)">${esc(d.nokp)} \u00b7 ${esc(d.kelas)}</div>
        <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"><span class="pill" style="background:var(--absent-soft);color:var(--absent)">${abs.length} kali tidak hadir</span><span class="pill g">${disc.length} rekod hukuman</span></div>
      </div>
      <h4 style="margin:6px 2px 8px;color:var(--brand)">Butiran Tidak Hadir</h4>
      ${aRows.length?`<table class="rpt-table"><tr><th>Tarikh</th><th>Subjek</th><th>Masa</th><th>Cikgu (rekod)</th><th>Sebab</th></tr>
        ${aRows.map(a=>`<tr><td>${esc(a.date)}</td><td>${esc(a.subject)}</td><td>${esc(fmtMasa(a.masa))}</td><td>${esc(a.cikgu)}</td><td><span class="pill">${esc(a.reason)}</span></td></tr>`).join('')}
        </table>`:'<div class="empty" style="padding:12px">Tiada rekod.</div>'}
      <h4 style="margin:18px 2px 8px;color:var(--brand)">Hukuman / Tindakan</h4>
      <div class="addrow">
        <select id="hk-action">${HK_ACTIONS.map(a=>`<option>${a}</option>`).join('')}</select>
        <input type="text" id="hk-note" placeholder="Catatan (pilihan)">
        <button class="btn btn-primary" id="hk-add">Rekod Hukuman</button>
      </div>
      <div id="hk-disc" style="margin-top:8px">${disc.length?disc.map(x=>`<div class="item"><span class="grow"><span class="nm">${esc(x.action)}</span><br><span class="sub">${esc((x.created_at||'').slice(0,10))}${x.recorded_name?' \u00b7 '+esc(x.recorded_name):''}${x.note?' \u00b7 '+esc(x.note):''}</span></span><button class="icon-btn danger" data-del="${x.id}">Padam</button></div>`).join(''):'<div class="sub">Tiada rekod hukuman.</div>'}</div>`;

    $('#hk-back').onclick=()=>{const k=$('#hk-kelas').value;if(k)hkListByClass(k);else hkSearch();};
    $('#hk-add').onclick=async()=>{
      const action=$('#hk-action').value,note=$('#hk-note').value.trim();
      try{const {error}=await sb.from('discipline').insert({student_nokp:d.nokp,student_name:d.name,class_name:d.kelas,action,note,recorded_by:null,recorded_name:adminName});
        if(error)throw error; toast('Hukuman direkod \u2713'); hkProfil(d);}catch(e){toast('Ralat: '+e.message);}
    };
    $('#hk-disc').onclick=async e=>{const b=e.target.closest('[data-del]');if(!b)return;if(confirm('Padam rekod hukuman ini?')){try{const {error}=await sb.from('discipline').delete().eq('id',b.dataset.del);if(error)throw error;hkProfil(d);toast('Dipadam');}catch(e){toast('Ralat: '+e.message);}}};
  }catch(e){box.innerHTML='<div class="empty">Ralat: '+esc(e.message)+'</div>';}
}

document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');
  const k=tab.dataset.tab;
  $('#tab-guru').classList.toggle('hidden',k!=='guru');
  $('#tab-pelajar').classList.toggle('hidden',k!=='pelajar');
  $('#tab-data').classList.toggle('hidden',k!=='data');
  $('#tab-hukuman').classList.toggle('hidden',k!=='hukuman');
  if(k==='guru')renderGuru();if(k==='pelajar')renderPelajar();if(k==='data')renderData();if(k==='hukuman')renderHukuman();
}));

boot();
</script>
</body>
</html>
